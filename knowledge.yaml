kcp_version: "0.14"
project: "merkabit-companion-analysis"
description: >
  Cross-platform empirical evidence for the Merkabit 4/3 threshold signature.
  Analyzes stretched-exponential (KWW) exponent α ~ 4/3 across quantum, plasma,
  atmospheric, biological, and neural systems spanning 10 orders of magnitude
  in spatial scale. Datasets: discrete time crystals (Google Sycamore), tokamak
  ELMs (ASDEX Upgrade), Hurricane Dorian, epileptic seizures (CHB-MIT EEG),
  IBM quantum hardware (DAQEC), colloidal gel, meditation EEG (Rishikesh),
  quasars (SDSS), Perseus cluster X-ray. All 11+ datasets converge on α ≈ 4/3.
version: "1.0"
created: "2026-04-06"
maintainer: "Selina Stenberg"

